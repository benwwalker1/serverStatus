name: Build Dashboard

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  push:
    paths:
      - 'data/live/*.json'  # Rebuild when a server reports in
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (in case of concurrent pushes)
        run: git pull --rebase origin main || true

      - name: Aggregate data
        run: python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.csv data/history.json data/incidents.json data/archive/
          if ! git diff --cached --quiet; then
            git commit -m "Update data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
