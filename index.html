<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab Server Status</title>
<style>
:root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.updated { color: var(--text-dim); font-size: 0.85rem; }
#refresh-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
#refresh-btn:hover { border-color: var(--blue); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.card.up { border-left: 3px solid var(--green); }
.card.down { border-left: 3px solid var(--red); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-header h2 { font-size: 1.2rem; font-weight: 600; }
.badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-up { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-down { background: rgba(239,68,68,0.15); color: var(--red); }
.last-seen { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; }
.age { opacity: 0.7; }
.checks { width: 100%; margin-bottom: 4px; }
.checks td { padding: 3px 0; font-size: 0.85rem; }
.checks td:first-child { color: var(--text-dim); width: 60px; }
.checks td:nth-child(2) { width: 24px; text-align: center; }
.checks td:nth-child(3) { width: 100%; }
.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.dot.green { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.dot.red { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
.sparkline { width: 100%; height: 16px; border-radius: 3px; overflow: hidden; display: block; }
.spark-axis { position: relative; height: 14px; font-size: 0.6rem; color: var(--text-dim); margin-bottom: 10px; margin-left: 84px; }
.spark-axis span { position: absolute; white-space: nowrap; }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.metric { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px; text-align: center; }
.metric .label { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
.metric .value { display: block; font-size: 1rem; font-weight: 600; }
.hw-info { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-align: center; }
.slo { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; font-size: 0.75rem; color: var(--text-dim); padding-top: 8px; border-top: 1px solid var(--border); text-align: center; }
section { margin-bottom: 32px; }
section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
table.data { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
table.data th { text-align: left; padding: 8px 6px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
table.data td { padding: 6px; border-bottom: 1px solid rgba(51,65,85,0.5); }
.table-wrap { background: var(--surface); border-radius: 12px; padding: 16px; overflow-x: auto; max-height: 500px; overflow-y: auto; }
details summary { cursor: pointer; color: var(--blue); font-size: 0.9rem; margin-bottom: 8px; }
details summary:hover { text-decoration: underline; }
footer { text-align: center; color: var(--text-dim); font-size: 0.75rem; padding: 24px 0; }
footer a { color: var(--blue); }
.loading { color: var(--text-dim); text-align: center; padding: 32px; }
@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .slo { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Lab Server Status</h1>
        <div class="header-right">
            <span class="updated" id="updated">Loading...</span>
            <button id="refresh-btn" onclick="loadDashboard()">Refresh</button>
        </div>
    </header>
    <div class="grid" id="cards">
        <p class="loading">Loading server data...</p>
    </div>
    <section>
        <h2>Incidents</h2>
        <div class="table-wrap" id="incidents">
            <p class="loading">Loading...</p>
        </div>
    </section>
    <section>
        <h2>Recent History</h2>
        <details>
            <summary>Show recent checks</summary>
            <div class="table-wrap" id="history">
                <p class="loading">Loading...</p>
            </div>
        </details>
    </section>
    <footer>
        Servers self-report every 5 min &middot; Auto-refreshes every 5 min &middot;
        <a href="https://github.com/benwwalker1/serverStatus">GitHub</a>
    </footer>
</div>
<script>
const BASE = 'https://raw.githubusercontent.com/benwwalker1/serverStatus/main';
const SERVERS = ['nsc1', 'nsc2', 'nsc3', 'nsc4'];
const STALE_SEC = 600;
const REFRESH_MS = 300000;
const HOURS_7D = 168;

// ── Time formatting ──

function fmtDate(d, tz) {
    const y = d.toLocaleString('en-US', { timeZone: tz, year: 'numeric' });
    const m = d.toLocaleString('en-US', { timeZone: tz, month: 'short' });
    const day = d.toLocaleString('en-US', { timeZone: tz, day: '2-digit' });
    return y + ' ' + m + ' ' + day;
}

function formatTime(utcStr) {
    if (!utcStr) return 'Never';
    const d = new Date(utcStr.endsWith('Z') ? utcStr : utcStr + 'Z');
    if (isNaN(d)) return utcStr;
    const tz = 'America/Chicago';
    const date = fmtDate(d, tz);
    const time = d.toLocaleString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false, timeZoneName: 'short' });
    const eu = d.toLocaleString('en-US', { timeZone: 'Europe/Berlin', hour: '2-digit', minute: '2-digit', hour12: false, timeZoneName: 'short' });
    const utc = d.toLocaleString('en-US', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', hour12: false }) + ' UTC';
    return date + ' ' + time + ' / ' + eu + ' / ' + utc;
}

function timeAgo(epochSec) {
    const diff = Math.floor(Date.now() / 1000) - epochSec;
    if (diff < 0) return 'just now';
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

// ── Sparkline ──

function buildBuckets(entries, server) {
    const nowSec = Math.floor(Date.now() / 1000);
    const startSec = nowSec - 7 * 86400;
    const out = { on: new Array(HOURS_7D).fill(null), cuda: new Array(HOURS_7D).fill(null), mumax: new Array(HOURS_7D).fill(null) };
    for (const e of entries) {
        if (e.s !== server) continue;
        const h = Math.floor((e.t - startSec) / 3600);
        if (h >= 0 && h < HOURS_7D) {
            out.on[h] = e.on;
            out.cuda[h] = e.cuda;
            out.mumax[h] = e.mumax;
        }
    }
    // After the first report, treat gaps (null) as down — but give a 30-min
    // grace period so busy servers aren't shown as down for brief gaps.
    // Only mark null as red for buckets older than 30 min ago.
    const cutoffBucket = Math.floor((nowSec - 1800 - startSec) / 3600);
    for (const key of ['on', 'cuda', 'mumax']) {
        let firstReport = -1;
        for (let i = 0; i < HOURS_7D; i++) {
            if (out[key][i] !== null) { firstReport = i; break; }
        }
        if (firstReport >= 0) {
            for (let i = firstReport; i <= Math.min(cutoffBucket, HOURS_7D - 1); i++) {
                if (out[key][i] === null) out[key][i] = false;
            }
        }
    }
    return out;
}

function sparkSVG(buckets) {
    const n = buckets.length;
    let svg = '';
    for (let i = 0; i < n; i++) {
        const v = buckets[i];
        const color = v === null ? '#1e293b' : (v ? '#22c55e' : '#ef4444');
        const x = (i / n * 168).toFixed(2);
        const w = (168 / n + 0.3).toFixed(2);
        svg += '<rect x="' + x + '" y="0" width="' + w + '" height="16" fill="' + color + '"/>';
    }
    return '<svg viewBox="0 0 168 16" preserveAspectRatio="none" class="sparkline">' + svg + '</svg>';
}

function sparkAxis() {
    return '<div class="spark-axis">' +
        '<span style="left:0">7d ago</span>' +
        '<span style="right:0">now</span>' +
        '</div>';
}

// ── Uptime stats ──

function uptimePct(entries, server, windowHours) {
    const nowSec = Math.floor(Date.now() / 1000);
    const cutoff = windowHours !== null ? nowSec - windowHours * 3600 : 0;
    let total = 0, online = 0;
    for (const e of entries) {
        if (e.s !== server || e.t < cutoff) continue;
        total++;
        if (e.on) online++;
    }
    if (total === 0) return 'N/A';
    return (100 * online / total).toFixed(1) + '%';
}

// ── Helpers ──

function dot(val) {
    return '<span class="dot ' + (val ? 'green' : 'red') + '"></span>';
}

function vna(v) {
    if (v === null || v === undefined || v === 'NA' || v === 'null' || v === '') return 'N/A';
    return String(v);
}

function findLastOnline(entries, server) {
    for (let i = entries.length - 1; i >= 0; i--) {
        if (entries[i].s === server && entries[i].on) return entries[i];
    }
    return null;
}

// ── Rendering ──

function renderCards(liveMap, entries) {
    const nowSec = Math.floor(Date.now() / 1000);
    let html = '';

    for (const srv of SERVERS) {
        const data = liveMap[srv];
        const isOnline = data && (nowSec - data.timestamp_epoch) < STALE_SEC;
        const cardCls = isOnline ? 'card up' : 'card down';
        const badge = isOnline
            ? '<span class="badge badge-up">ONLINE</span>'
            : '<span class="badge badge-down">OFFLINE</span>';

        let lastSeen, cuda, mumax, cpuUtil, gpuUtil, ramStr, gpuStr, gpuNames, ageStr, mumaxVer, cudaDriver;

        if (data && isOnline) {
            cuda = data.cuda_ok;
            mumax = data.mumax3_ok;
            cpuUtil = vna(data.cpu_util_pct); if (cpuUtil !== 'N/A') cpuUtil += '%';
            gpuUtil = vna(data.gpu_util_pct); if (gpuUtil !== 'N/A') gpuUtil += '%';
            const rf = vna(data.ram_free_gb), rt = vna(data.ram_total_gb);
            ramStr = (rf !== 'N/A' && rt !== 'N/A') ? rf + ' / ' + rt + ' GB' : 'N/A';
            const gf = vna(data.gpu_free_count), gc = vna(data.gpu_count);
            gpuStr = (gf !== 'N/A' && gc !== 'N/A') ? gf + ' / ' + gc + ' free' : 'N/A';
            gpuNames = vna(data.gpu_names);
            mumaxVer = vna(data.mumax3_version);
            cudaDriver = vna(data.cuda_driver_version);
            lastSeen = formatTime(data.timestamp_utc);
            ageStr = timeAgo(data.timestamp_epoch);
        } else {
            cuda = 0; mumax = 0; cpuUtil = 'N/A'; gpuUtil = 'N/A';
            mumaxVer = 'N/A'; cudaDriver = 'N/A';
            const hist = findLastOnline(entries, srv);
            if (hist) {
                lastSeen = formatTime(new Date(hist.t * 1000).toISOString());
                ageStr = timeAgo(hist.t);
                const rt = vna(hist.ram_t);
                ramStr = rt !== 'N/A' ? rt + ' GB (last known)' : 'N/A';
                const gc = vna(hist.gpu_c);
                gpuStr = gc !== 'N/A' ? gc + ' total (last known)' : 'N/A';
                gpuNames = vna(hist.gpu_n);
                mumaxVer = vna(hist.mx_v);
                cudaDriver = vna(hist.cd_v);
            } else {
                lastSeen = 'Never'; ageStr = '';
                ramStr = gpuStr = gpuNames = 'N/A';
            }
        }

        const bk = buildBuckets(entries, srv);
        const up24 = uptimePct(entries, srv, 24);
        const up7d = uptimePct(entries, srv, 168);
        const up30d = uptimePct(entries, srv, 720);
        const upAll = uptimePct(entries, srv, null);

        html += '<div class="' + cardCls + '">' +
            '<div class="card-header"><h2>' + srv + '</h2>' + badge + '</div>' +
            '<div class="last-seen">Last report: ' + lastSeen +
                (ageStr ? ' <span class="age">(' + ageStr + ')</span>' : '') + '</div>' +
            '<table class="checks">' +
            '<tr><td>Online</td><td>' + dot(isOnline) + '</td><td>' + sparkSVG(bk.on) + '</td></tr>' +
            '<tr><td>CUDA</td><td>' + dot(cuda) + '</td><td>' + sparkSVG(bk.cuda) + '</td></tr>' +
            '<tr><td>Mumax3</td><td>' + dot(mumax) + '</td><td>' + sparkSVG(bk.mumax) + '</td></tr>' +
            '</table>' +
            sparkAxis() +
            '<div class="metrics">' +
            '<div class="metric"><span class="label">CPU</span><span class="value">' + cpuUtil + '</span></div>' +
            '<div class="metric"><span class="label">GPU Util</span><span class="value">' + gpuUtil + '</span></div>' +
            '<div class="metric"><span class="label">RAM Free</span><span class="value">' + ramStr + '</span></div>' +
            '<div class="metric"><span class="label">GPUs</span><span class="value">' + gpuStr + '</span></div>' +
            '</div>' +
            '<div class="hw-info">' + gpuNames + '</div>' +
            '<div class="hw-info">Mumax3 v' + mumaxVer + ' &middot; CUDA Driver ' + cudaDriver + '</div>' +
            '<div class="slo">' +
            '<span>24h: <b>' + up24 + '</b></span>' +
            '<span>7d: <b>' + up7d + '</b></span>' +
            '<span>30d: <b>' + up30d + '</b></span>' +
            '<span>All: <b>' + upAll + '</b></span>' +
            '</div></div>';
    }
    return html;
}

function renderIncidents(incidents) {
    if (!incidents || !incidents.length) {
        return '<p style="color:var(--text-dim);padding:12px;">No incidents recorded yet.</p>';
    }
    let rows = '';
    const recent = incidents.slice().reverse().slice(0, 50);
    for (const inc of recent) {
        const arrow = inc.d === 'up'
            ? '<span class="dot green"></span> recovered'
            : '<span class="dot red"></span> down';
        rows += '<tr><td>' + formatTime(inc.ts) + '</td><td>' + inc.s +
            '</td><td>' + inc.c + '</td><td>' + arrow + '</td></tr>';
    }
    return '<table class="data"><thead><tr><th>Time</th><th>Server</th><th>Check</th><th>Status</th></tr></thead><tbody>' +
        rows + '</tbody></table>';
}

function renderHistory(entries) {
    if (!entries || !entries.length) {
        return '<p style="color:var(--text-dim);padding:12px;">No history yet.</p>';
    }
    const recent = entries.slice(-100).reverse();
    let rows = '';
    for (const e of recent) {
        const ts = new Date(e.t * 1000).toISOString();
        rows += '<tr>' +
            '<td>' + formatTime(ts) + '</td><td>' + e.s + '</td>' +
            '<td>' + dot(e.on) + '</td><td>' + dot(e.cuda) + '</td><td>' + dot(e.mumax) + '</td>' +
            '<td>' + vna(e.gpu_u) + '</td><td>' + vna(e.cpu_u) + '</td>' +
            '<td>' + vna(e.ram_f) + '/' + vna(e.ram_t) + '</td>' +
            '<td>' + vna(e.gpu_fc) + '/' + vna(e.gpu_c) + '</td></tr>';
    }
    return '<table class="data"><thead><tr>' +
        '<th>Time</th><th>Server</th><th>Online</th><th>CUDA</th><th>Mumax3</th>' +
        '<th>GPU %</th><th>CPU %</th><th>RAM (free/total)</th><th>GPUs (free/total)</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
}

// ── Data fetching ──

async function fetchJSON(url) {
    const r = await fetch(url + '?_=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return null;
    return r.json();
}

async function fetchAll() {
    const [liveArr, history, incidents] = await Promise.all([
        Promise.all(SERVERS.map(s => fetchJSON(BASE + '/data/live/' + s + '.json'))),
        fetchJSON(BASE + '/data/history.json'),
        fetchJSON(BASE + '/data/incidents.json'),
    ]);
    const live = {};
    liveArr.forEach((d, i) => { if (d) live[SERVERS[i]] = d; });
    return {
        live: live,
        history: history || { entries: [] },
        incidents: incidents || { incidents: [] },
    };
}

// ── Main ──

async function loadDashboard() {
    try {
        const data = await fetchAll();
        document.getElementById('cards').innerHTML = renderCards(data.live, data.history.entries || []);
        document.getElementById('incidents').innerHTML = renderIncidents(data.incidents.incidents || []);
        document.getElementById('history').innerHTML = renderHistory(data.history.entries || []);
        const now = new Date();
        document.getElementById('updated').textContent = 'Loaded: ' +
            fmtDate(now, 'America/Chicago') + ' ' +
            now.toLocaleString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', hour12: false, timeZoneName: 'short' });
    } catch (err) {
        document.getElementById('updated').textContent = 'Error: ' + err.message;
    }
}

loadDashboard();
setInterval(loadDashboard, REFRESH_MS);
</script>
</body>
</html>
